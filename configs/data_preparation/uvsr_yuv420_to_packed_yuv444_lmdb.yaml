jobs:
  - name: "uvsr_yuv420_to_packed_yuv444_lmdb"
    mode: paired
    seed: 1234
    sources:
      lq:
        root: "../../data/train_uvsr/lq_yuv420"
        glob: "*.yuv"
        key_pattern: "^(?P<key>.+?)_(?:I)?(?:420|444)p\\.yuv$"
        decoder:
          type: raw_yuv
          info_pattern: "^(?P<key>.+?)_(?P<width>\\d+)x(?P<height>\\d+)_(?P<pixel_format>I420p|I444p|420p|444p)\\.yuv$"
      gt:
        root: "../../data/train_uvsr/gt_yuv444"
        glob: "*.yuv"
        key_pattern: "^(?P<key>.+?)_(?:I)?(?:420|444)p\\.yuv$"
        decoder:
          type: raw_yuv
          info_pattern: "^(?P<key>.+?)_(?P<width>\\d+)x(?P<height>\\d+)_(?P<pixel_format>I420p|I444p|420p|444p)\\.yuv$"
    pipeline:
      - op: yuv420_to_yuv444_nn
        frame: lq
      - op: crop
        frames: [lq, gt]
        reference: lq
        mode: grid_full
        width: 256
        height: 256
        stride_x: 256
        stride_y: 256
    outputs:
      lq:
        frame: lq
        backend: lmdb
        output_path: "../../data/train_uvsr_packed_lmdb/lq.lmdb"
        format: packed_yuv444_png
        key_pattern: "{index:08d}"
        map_size_gb: 0.25
        write_batch_size: 512
        compact: true
        png_compress_level: 3
      gt:
        frame: gt
        backend: lmdb
        output_path: "../../data/train_uvsr_packed_lmdb/gt.lmdb"
        format: packed_yuv444_png
        key_pattern: "{index:08d}"
        map_size_gb: 0.25
        write_batch_size: 512
        compact: true
        png_compress_level: 3
