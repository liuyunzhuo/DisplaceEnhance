jobs:
  - name: "desktop_yuv420_identity_lmdb"
    mode: single
    seed: 1234
    sources:
      lq:
        root: "../../data/train/desktop_yuv420"
        glob: "*.yuv"
        decoder:
          type: raw_yuv
          info_pattern: "^(?P<key>.+?)_(?P<width>\\d+)x(?P<height>\\d+)_(?P<pixel_format>420p|444p)\\.yuv$"
    pipeline:
      - op: yuv420_to_yuv444_nn
        frame: lq
      - op: yuv444_to_rgb
        frame: lq
        matrix: bt709
        range: limited
      - op: crop
        frames: [lq]
        mode: grid_full
        width: 256
        height: 256
        stride_x: 256
        stride_y: 256
    outputs:
      lq:
        frame: lq
        backend: lmdb
        output_path: "../../data/train_desktop_identity_lmdb/lq.lmdb"
        format: rgb_png
        key_pattern: "{index:08d}"
        map_size_gb: 0.25
        write_batch_size: 512
        compact: true
        png_compress_level: 3
