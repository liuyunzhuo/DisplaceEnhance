jobs:
  - name: "uvsr_test_yuv_to_packed_png"
    mode: paired
    seed: 1234
    sources:
      lq:
        root: "../../data/test_uvsr/lq_yuv420"
        glob: "*.yuv"
        key_pattern: "^(?P<key>.+?)_(?:I)?(?:420|444)p\\.yuv$"
        decoder:
          type: raw_yuv
          info_pattern: "^(?P<key>.+?)_(?P<width>\\d+)x(?P<height>\\d+)_(?P<pixel_format>I420p|I444p|420p|444p)\\.yuv$"
      gt:
        root: "../../data/test_uvsr/gt_yuv444"
        glob: "*.yuv"
        key_pattern: "^(?P<key>.+?)_(?:I)?(?:420|444)p\\.yuv$"
        decoder:
          type: raw_yuv
          info_pattern: "^(?P<key>.+?)_(?P<width>\\d+)x(?P<height>\\d+)_(?P<pixel_format>I420p|I444p|420p|444p)\\.yuv$"
    pipeline:
      - op: yuv420_to_yuv444_nn
        frame: lq
    outputs:
      lq:
        frame: lq
        backend: files
        output_path: "../../data/test_uvsr_packed_png/lq"
        format: packed_yuv444_png
        filename_pattern: "{source_lq_stem}_yuv444png.png"
        png_compress_level: 3
      gt:
        frame: gt
        backend: files
        output_path: "../../data/test_uvsr_packed_png/gt"
        format: packed_yuv444_png
        filename_pattern: "{source_gt_stem}_yuv444png.png"
        png_compress_level: 3
